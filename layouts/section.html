{{ define "main" }}
  <style>
    .article-card { display: block; text-decoration: none; color: inherit; }
    .article-card section { background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-left: 4px solid var(--color-action); border-radius: var(--radius-md); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm); transition: all 0.2s ease; }
    .article-card:hover section { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--color-primary); }
  </style>
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="article-card">
      <section>
        <h2 style="margin-top: 0;">{{ .LinkTitle }}</h2>
        <p style="margin: 0 0 0.5rem 0;">{{ .Description }}</p>
        {{ with .Params.author }}
          <p style="margin: 0; font-size: 0.9rem; color: var(--color-text-muted);">By {{ . }}</p>
        {{ end }}
      </section>
    </a>
  {{ end }}
{{ end }}
