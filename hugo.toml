baseURL = 'https://ryanrix.com/'
locale = 'en-us'
title = 'Ryan Rix'
theme = 'jtbh-basic'

ignoreLogs = ['warning-goldmark-raw-html']

[params]
  description = 'Economics, climate, and energy — for people who notice the story does not add up.'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  category = 'categories'
  tag = 'tags'
  level = 'levels'
  author = 'authors'

[[menu.main]]
  identifier = 'economics'
  name = 'Economics'
  url = '/economics/'
  weight = 10

[[menu.main]]
  identifier = 'energy'
  name = 'Climate & Energy'
  url = '/energy/'
  weight = 15

[[menu.main]]
  identifier = 'notes'
  name = 'Notes'
  url = '/notes/'
  weight = 12

[[menu.main]]
  identifier = 'about'
  name = 'About'
  url = '/about/'
  weight = 20

[sitemap]
  changefreq = 'weekly'
  priority = 0.8
  filename = 'sitemap.xml'
