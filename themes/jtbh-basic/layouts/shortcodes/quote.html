{{- $author := .Get "author" | default "" -}}
<div class="shortcode-quote" style="border-left: 4px solid var(--color-primary); padding: 1rem 1.25rem; margin: 1.5rem 0; background-color: #F4F0FA; border-radius: 0 12px 12px 0;">
  <p style="margin: 0 0 0.25rem 0; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-primary);">Quote</p>
  <blockquote style="margin: 0; padding: 0; border: none; font-style: italic; color: var(--color-text-main);">
    {{ .Inner | markdownify }}
  </blockquote>
  {{- if $author -}}
  <p style="margin: 0.5rem 0 0 0; font-weight: 700; color: var(--color-text-muted);">- {{ $author }}</p>
  {{- end -}}
</div>
